rules:
- description: Validate that pull request contain "PR" in their names.
  enabled: true
  severity: medium
  event_types: ["pull_request"]
  parameters:
    title_pattern: ".*CURL.*"
- description: Error if any Python (.py) file is changed in the PR.
  enabled: true
  severity: high
  event_types: ["pull_request"]
  parameters:
    pattern: "tests/.*\\.py$|test_.*\\.py$"
    condition_type: "files_match_pattern"

