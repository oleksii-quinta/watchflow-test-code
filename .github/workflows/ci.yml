name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/watchflow_test"
  REDIS_URL: "redis://localhost:6379/0"
  FLASK_ENV: "testing"
  SECRET_KEY: "ci-test-secret-not-real"

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install lint deps
        run: pip install ruff mypy

      - name: Ruff
        run: ruff check .

      - name: Type check
        run: mypy app/ --ignore-missing-imports

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install bandit
        run: pip install bandit[toml]

      - name: Run bandit
        run: bandit -r app/ -ll -ii

      - name: Dependency audit
        run: |
          pip install pip-audit
          pip-audit -r requirements.txt
